name: neosapian_file_sharing_app
description: Real-time cross-device file sharing — NeoSapien Assessment
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  supabase_flutter: ^2.3.0
  firebase_messaging: ^15.1.3
  pigeon: ^22.0.0
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # File handling
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  mime: ^1.0.6
  crypto: ^3.0.3

  # Permissions
  permission_handler: ^11.3.1

  # UI & UX
  go_router: ^14.2.7
  gap: ^3.0.1
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  open_filex: ^4.5.0
  share_plus: ^10.0.2
  url_launcher: ^6.3.0

  # Utils
  uuid: ^4.4.2
  intl: ^0.19.0
  connectivity_plus: ^6.0.5
  device_info_plus: ^10.1.2
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.3
  rxdart: ^0.28.0
  collection: ^1.18.0

  # Dio for chunked uploads
  dio: ^5.7.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#09090B"
  adaptive_icon_foreground: "assets/app_icon.png"